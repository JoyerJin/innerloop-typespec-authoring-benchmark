openapi: 3.1.0
info:
  title: Widget
  description: Microsoft.Widget Resource Provider management API.
  version: '2021-10-01'
tags:
  - name: Operations
  - name: Employees
paths:
  /providers/Microsoft.Widget/operations:
    get:
      operationId: Operations_list
      description: List the operations for the provider
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.ApiVersionParameter'
      responses:
        '200':
          description: Azure operation completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationListResult'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ErrorResponse'
      tags:
        - Operations
  /subscriptions/{subscriptionId}/providers/Microsoft.Widget/employees:
    get:
      operationId: Employees_listBySubscription
      description: List Employee resources by subscription ID
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.ApiVersionParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.SubscriptionIdParameter'
      responses:
        '200':
          description: Azure operation completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeListResult'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ErrorResponse'
      tags:
        - Employees
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Widget/employees:
    get:
      operationId: Employees_listByResourceGroup
      description: List Employee resources by resource group
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.ApiVersionParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.SubscriptionIdParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.ResourceGroupNameParameter'
      responses:
        '200':
          description: Azure operation completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeListResult'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ErrorResponse'
      tags:
        - Employees
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Widget/employees/{employeeName}:
    get:
      operationId: Employees_get
      description: Get a Employee
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.ApiVersionParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.SubscriptionIdParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.ResourceGroupNameParameter'
        - name: employeeName
          in: path
          required: true
          description: The name of the Employee
          schema:
            type: string
            pattern: ^[a-zA-Z0-9-]{3,24}$
      responses:
        '200':
          description: Azure operation completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ErrorResponse'
      tags:
        - Employees
    put:
      operationId: Employees_createOrUpdate
      description: Create a Employee
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.ApiVersionParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.SubscriptionIdParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.ResourceGroupNameParameter'
        - name: employeeName
          in: path
          required: true
          description: The name of the Employee
          schema:
            type: string
            pattern: ^[a-zA-Z0-9-]{3,24}$
      responses:
        '200':
          description: Resource 'Employee' update operation succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '201':
          description: Resource 'Employee' create operation succeeded
          headers:
            Azure-AsyncOperation:
              required: false
              description: A link to the status monitor
              schema:
                type: string
            Retry-After:
              required: false
              description: The Retry-After header can indicate how long the client should wait before polling the operation status.
              schema:
                type: integer
                format: int32
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ErrorResponse'
      tags:
        - Employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
        description: Resource create parameters.
    patch:
      operationId: Employees_update
      description: Update a Employee
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.ApiVersionParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.SubscriptionIdParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.ResourceGroupNameParameter'
        - name: employeeName
          in: path
          required: true
          description: The name of the Employee
          schema:
            type: string
            pattern: ^[a-zA-Z0-9-]{3,24}$
      responses:
        '200':
          description: Azure operation completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ErrorResponse'
      tags:
        - Employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeUpdate'
        description: The resource properties to be updated.
    delete:
      operationId: Employees_delete
      description: Delete a Employee
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.ApiVersionParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.SubscriptionIdParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.CommonTypes.ResourceGroupNameParameter'
        - name: employeeName
          in: path
          required: true
          description: The name of the Employee
          schema:
            type: string
            pattern: ^[a-zA-Z0-9-]{3,24}$
      responses:
        '202':
          description: Resource deletion accepted.
          headers:
            Location:
              required: false
              description: The Location header contains the URL where the status of the long running operation can be checked.
              schema:
                type: string
            Retry-After:
              required: false
              description: The Retry-After header can indicate how long the client should wait before polling the operation status.
              schema:
                type: integer
                format: int32
        '204':
          description: Resource does not exist.
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ErrorResponse'
      tags:
        - Employees
security:
  - azure_auth:
      - user_impersonation
components:
  parameters:
    Azure.ResourceManager.CommonTypes.ApiVersionParameter:
      name: api-version
      in: query
      required: true
      description: The API version to use for this operation.
      schema:
        type: string
        minLength: 1
      explode: false
    Azure.ResourceManager.CommonTypes.ResourceGroupNameParameter:
      name: resourceGroupName
      in: path
      required: true
      description: The name of the resource group. The name is case insensitive.
      schema:
        type: string
        pattern: ^[-\w\._\(\)]+$
        minLength: 1
        maxLength: 90
    Azure.ResourceManager.CommonTypes.SubscriptionIdParameter:
      name: subscriptionId
      in: path
      required: true
      description: The ID of the target subscription. The value must be an UUID.
      schema:
        $ref: '#/components/schemas/Azure.Core.uuid'
        minLength: 1
  schemas:
    Azure.Core.armResourceType:
      type: string
      description: Represents an Azure Resource Type.
    Azure.Core.azureLocation:
      type: string
      description: Represents an Azure geography region where supported resource providers live.
    Azure.Core.uuid:
      type: string
      format: uuid
      description: Universally Unique Identifier
    Azure.ResourceManager.CommonTypes.AccessRule:
      type: object
      properties:
        name:
          type: string
          description: Name of the access rule
        properties:
          $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.AccessRuleProperties'
      description: Access rule in a network security perimeter configuration profile
    Azure.ResourceManager.CommonTypes.AccessRuleDirection:
      anyOf:
        - type: string
        - type: string
          enum:
            - Inbound
            - Outbound
      description: Direction of Access Rule
    Azure.ResourceManager.CommonTypes.AccessRuleProperties:
      type: object
      properties:
        direction:
          $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.AccessRuleDirection'
        addressPrefixes:
          type: array
          items:
            type: string
          description: Address prefixes in the CIDR format for inbound rules
        subscriptions:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: arm-id
                description: The fully qualified Azure resource ID of the subscription e.g. ('/subscriptions/00000000-0000-0000-0000-000000000000')
          description: Subscriptions for inbound rules
        networkSecurityPerimeters:
          type: array
          items:
            $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.NetworkSecurityPerimeter'
          description: Network security perimeters for inbound rules
        fullyQualifiedDomainNames:
          type: array
          items:
            type: string
          description: Fully qualified domain names (FQDN) for outbound rules
        emailAddresses:
          type: array
          items:
            type: string
          description: Email addresses for outbound rules
        phoneNumbers:
          type: array
          items:
            type: string
          description: Phone numbers for outbound rules
      description: Properties of Access Rule
    Azure.ResourceManager.CommonTypes.ActionType:
      anyOf:
        - type: string
          enum:
            - Internal
        - type: string
      description: Extensible enum. Indicates the action type. "Internal" refers to actions that are for internal only APIs.
    Azure.ResourceManager.CommonTypes.AzureEntityResource:
      type: object
      properties:
        etag:
          type: string
          description: Resource Etag.
          readOnly: true
      allOf:
        - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.Resource'
      description: The resource model definition for an Azure Resource Manager resource with an etag.
      title: Entity Resource
    Azure.ResourceManager.CommonTypes.ErrorAdditionalInfo:
      type: object
      properties:
        type:
          type: string
          description: The additional info type.
          readOnly: true
        info:
          description: The additional info.
          readOnly: true
      description: The resource management error additional info.
    Azure.ResourceManager.CommonTypes.ErrorDetail:
      type: object
      properties:
        code:
          type: string
          description: The error code.
          readOnly: true
        message:
          type: string
          description: The error message.
          readOnly: true
        target:
          type: string
          description: The error target.
          readOnly: true
        details:
          type: array
          items:
            $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ErrorDetail'
          description: The error details.
          readOnly: true
        additionalInfo:
          type: array
          items:
            $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ErrorAdditionalInfo'
          description: The error additional info.
          readOnly: true
      description: The error detail.
    Azure.ResourceManager.CommonTypes.ErrorResponse:
      type: object
      properties:
        error:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ErrorDetail'
          description: The error object.
      description: Common error response for all Azure Resource Manager APIs to return error details for failed operations.
      title: Error response
    Azure.ResourceManager.CommonTypes.ExtensionResource:
      type: object
      allOf:
        - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.Resource'
      description: The base extension resource.
    Azure.ResourceManager.CommonTypes.Identity:
      type: object
      properties:
        principalId:
          allOf:
            - $ref: '#/components/schemas/Azure.Core.uuid'
          description: The principal ID of resource identity. The value must be an UUID.
          readOnly: true
        tenantId:
          allOf:
            - $ref: '#/components/schemas/Azure.Core.uuid'
          description: The tenant ID of resource. The value must be an UUID.
          readOnly: true
        type:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ResourceIdentityType'
          description: The identity type.
      description: Identity for the resource.
    Azure.ResourceManager.CommonTypes.IssueType:
      anyOf:
        - type: string
        - type: string
          enum:
            - Unknown
            - ConfigurationPropagationFailure
            - MissingPerimeterConfiguration
            - MissingIdentityConfiguration
      description: Type of issue
    Azure.ResourceManager.CommonTypes.NetworkSecurityPerimeter:
      type: object
      properties:
        id:
          type: string
          format: arm-id
          description: Fully qualified Azure resource ID of the NSP resource
        perimeterGuid:
          allOf:
            - $ref: '#/components/schemas/Azure.Core.uuid'
          description: Universal unique ID (UUID) of the network security perimeter
        location:
          type: string
          description: Location of the network security perimeter
      description: Information about a network security perimeter (NSP)
    Azure.ResourceManager.CommonTypes.NetworkSecurityPerimeterConfiguration:
      type: object
      properties:
        properties:
          $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.NetworkSecurityPerimeterConfigurationProperties'
      allOf:
        - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ProxyResource'
      description: Network security perimeter (NSP) configuration resource
    Azure.ResourceManager.CommonTypes.NetworkSecurityPerimeterConfigurationProperties:
      type: object
      properties:
        provisioningState:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.NetworkSecurityPerimeterConfigurationProvisioningState'
          readOnly: true
        provisioningIssues:
          type: array
          items:
            $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ProvisioningIssue'
          description: List of provisioning issues, if any
          readOnly: true
        networkSecurityPerimeter:
          $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.NetworkSecurityPerimeter'
        resourceAssociation:
          $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ResourceAssociation'
        profile:
          $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.NetworkSecurityProfile'
      description: Network security configuration properties.
    Azure.ResourceManager.CommonTypes.NetworkSecurityPerimeterConfigurationProvisioningState:
      anyOf:
        - type: string
        - type: string
          enum:
            - Succeeded
            - Creating
            - Updating
            - Deleting
            - Accepted
            - Failed
            - Canceled
      description: Provisioning state of a network security perimeter configuration that is being created or updated.
    Azure.ResourceManager.CommonTypes.NetworkSecurityProfile:
      type: object
      properties:
        name:
          type: string
          description: Name of the profile
        accessRulesVersion:
          type: integer
          format: int32
          description: Current access rules version
        accessRules:
          type: array
          items:
            $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.AccessRule'
          description: List of Access Rules
        diagnosticSettingsVersion:
          type: integer
          format: int32
          description: Current diagnostic settings version
        enabledLogCategories:
          type: array
          items:
            type: string
          description: List of log categories that are enabled
      description: Network security perimeter configuration profile
    Azure.ResourceManager.CommonTypes.Operation:
      type: object
      properties:
        name:
          type: string
          description: 'The name of the operation, as per Resource-Based Access Control (RBAC). Examples: "Microsoft.Compute/virtualMachines/write", "Microsoft.Compute/virtualMachines/capture/action"'
          readOnly: true
        isDataAction:
          type: boolean
          description: Whether the operation applies to data-plane. This is "true" for data-plane operations and "false" for Azure Resource Manager/control-plane operations.
          readOnly: true
        display:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.OperationDisplay'
          description: Localized display information for this particular operation.
        origin:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.Origin'
          description: The intended executor of the operation; as in Resource Based Access Control (RBAC) and audit logs UX. Default value is "user,system"
          readOnly: true
        actionType:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ActionType'
          description: Extensible enum. Indicates the action type. "Internal" refers to actions that are for internal only APIs.
          readOnly: true
      description: Details of a REST API operation, returned from the Resource Provider Operations API
      title: REST API Operation
    Azure.ResourceManager.CommonTypes.OperationDisplay:
      type: object
      properties:
        provider:
          type: string
          description: The localized friendly form of the resource provider name, e.g. "Microsoft Monitoring Insights" or "Microsoft Compute".
          readOnly: true
        resource:
          type: string
          description: The localized friendly name of the resource type related to this operation. E.g. "Virtual Machines" or "Job Schedule Collections".
          readOnly: true
        operation:
          type: string
          description: The concise, localized friendly name for the operation; suitable for dropdowns. E.g. "Create or Update Virtual Machine", "Restart Virtual Machine".
          readOnly: true
        description:
          type: string
          description: The short, localized friendly description of the operation; suitable for tool tips and detailed views.
          readOnly: true
      description: Localized display information for an operation.
    Azure.ResourceManager.CommonTypes.Origin:
      anyOf:
        - type: string
          enum:
            - user
            - system
            - user,system
        - type: string
      description: The intended executor of the operation; as in Resource Based Access Control (RBAC) and audit logs UX. Default value is "user,system"
    Azure.ResourceManager.CommonTypes.Plan:
      type: object
      required:
        - name
        - publisher
        - product
      properties:
        name:
          type: string
          description: A user defined name of the 3rd Party Artifact that is being procured.
        publisher:
          type: string
          description: The publisher of the 3rd Party Artifact that is being bought. E.g. NewRelic
        product:
          type: string
          description: The 3rd Party artifact that is being procured. E.g. NewRelic. Product maps to the OfferID specified for the artifact at the time of Data Market onboarding.
        promotionCode:
          type: string
          description: A publisher provided promotion code as provisioned in Data Market for the said product/artifact.
        version:
          type: string
          description: The version of the desired product/artifact.
      description: Plan for the resource.
    Azure.ResourceManager.CommonTypes.PrivateEndpoint:
      type: object
      properties:
        id:
          type: string
          format: arm-id
          description: The resource identifier of the private endpoint
          readOnly: true
      description: The private endpoint resource.
    Azure.ResourceManager.CommonTypes.PrivateEndpointConnection:
      type: object
      properties:
        properties:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.PrivateEndpointConnectionProperties'
          description: The private endpoint connection properties
      allOf:
        - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.Resource'
      description: The private endpoint connection resource
    Azure.ResourceManager.CommonTypes.PrivateEndpointConnectionProperties:
      type: object
      required:
        - privateLinkServiceConnectionState
      properties:
        groupIds:
          type: array
          items:
            type: string
          description: The group ids for the private endpoint resource.
          readOnly: true
        privateEndpoint:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.PrivateEndpoint'
          description: The private endpoint resource.
        privateLinkServiceConnectionState:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.PrivateLinkServiceConnectionState'
          description: A collection of information about the state of the connection between service consumer and provider.
        provisioningState:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.PrivateEndpointConnectionProvisioningState'
          description: The provisioning state of the private endpoint connection resource.
          readOnly: true
      description: Properties of the private endpoint connection.
    Azure.ResourceManager.CommonTypes.PrivateEndpointConnectionProvisioningState:
      anyOf:
        - type: string
        - type: string
          enum:
            - Succeeded
            - Creating
            - Deleting
            - Failed
      description: The current provisioning state.
    Azure.ResourceManager.CommonTypes.PrivateEndpointServiceConnectionStatus:
      anyOf:
        - type: string
          enum:
            - Pending
            - Approved
            - Rejected
        - type: string
      description: The private endpoint connection status.
    Azure.ResourceManager.CommonTypes.PrivateLinkResource:
      type: object
      properties:
        properties:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.PrivateLinkResourceProperties'
          description: Resource properties.
      allOf:
        - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.Resource'
      description: A private link resource.
    Azure.ResourceManager.CommonTypes.PrivateLinkResourceProperties:
      type: object
      properties:
        groupId:
          type: string
          description: The private link resource group id.
          readOnly: true
        requiredMembers:
          type: array
          items:
            type: string
          description: The private link resource required member names.
          readOnly: true
        requiredZoneNames:
          type: array
          items:
            type: string
          description: The private link resource private link DNS zone name.
      description: Properties of a private link resource.
    Azure.ResourceManager.CommonTypes.PrivateLinkServiceConnectionState:
      type: object
      properties:
        status:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.PrivateEndpointServiceConnectionStatus'
          description: Indicates whether the connection has been Approved/Rejected/Removed by the owner of the service.
        description:
          type: string
          description: The reason for approval/rejection of the connection.
        actionsRequired:
          type: string
          description: A message indicating if changes on the service provider require any updates on the consumer.
      description: A collection of information about the state of the connection between service consumer and provider.
    Azure.ResourceManager.CommonTypes.ProvisioningIssue:
      type: object
      properties:
        name:
          type: string
          description: Name of the issue
          readOnly: true
        properties:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ProvisioningIssueProperties'
          readOnly: true
      description: Describes a provisioning issue for a network security perimeter configuration
    Azure.ResourceManager.CommonTypes.ProvisioningIssueProperties:
      type: object
      properties:
        issueType:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.IssueType'
          description: Type of issue
          readOnly: true
        severity:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.Severity'
          description: Severity of the issue.
          readOnly: true
        description:
          type: string
          description: Description of the issue
          readOnly: true
        suggestedResourceIds:
          type: array
          items:
            type: string
            format: arm-id
            description: A type definition that refers the id to an Azure Resource Manager resource.
          description: Fully qualified resource IDs of suggested resources that can be associated to the network security perimeter (NSP) to remediate the issue.
          readOnly: true
        suggestedAccessRules:
          type: array
          items:
            $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.AccessRule'
          description: Access rules that can be added to the network security profile (NSP) to remediate the issue.
          readOnly: true
      description: Details of a provisioning issue for a network security perimeter (NSP) configuration. Resource providers should generate separate provisioning issue elements for each separate issue detected, and include a meaningful and distinctive description, as well as any appropriate suggestedResourceIds and suggestedAccessRules
    Azure.ResourceManager.CommonTypes.ProxyResource:
      type: object
      allOf:
        - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.Resource'
      description: The resource model definition for a Azure Resource Manager proxy resource. It will not have tags and a location
      title: Proxy Resource
    Azure.ResourceManager.CommonTypes.Resource:
      type: object
      properties:
        id:
          type: string
          format: arm-id
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}
          readOnly: true
        name:
          type: string
          description: The name of the resource
          readOnly: true
        type:
          allOf:
            - $ref: '#/components/schemas/Azure.Core.armResourceType'
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts"
          readOnly: true
        systemData:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.SystemData'
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
          readOnly: true
      description: Common fields that are returned in the response for all Azure Resource Manager resources
      title: Resource
    Azure.ResourceManager.CommonTypes.ResourceAssociation:
      type: object
      properties:
        name:
          type: string
          description: Name of the resource association
        accessMode:
          $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.ResourceAssociationAccessMode'
      description: Information about resource association
    Azure.ResourceManager.CommonTypes.ResourceAssociationAccessMode:
      anyOf:
        - type: string
        - type: string
          enum:
            - Enforced
            - Learning
            - Audit
      description: Access mode of the resource association
    Azure.ResourceManager.CommonTypes.ResourceIdentityType:
      type: string
      enum:
        - SystemAssigned
      description: ''
    Azure.ResourceManager.CommonTypes.ResourceModelWithAllowedPropertySet:
      type: object
      properties:
        managedBy:
          type: string
          description: |-
            The fully qualified resource ID of the resource that manages this resource. Indicates if this resource is managed by another Azure resource.
            If this is present, complete mode deployment will not delete the resource if it is removed from the template since it is managed by another resource.
        kind:
          type: string
          pattern: ^[-\w\._,\(\)]+$
          description: |-
            Metadata used by portal/tooling/etc to render different UX experiences for resources of the same type; e.g. ApiApps are a kind of Microsoft.Web/sites type.
            If supported, the resource provider must validate and persist this value.
        etag:
          type: string
          description: |-
            The etag field is *not* required. If it is provided in the response body, it must also be provided as a header per the normal etag convention.
            Entity tags are used for comparing two or more entities from the same requested resource. HTTP/1.1 uses entity tags in the etag (section 14.19),
            If-Match (section 14.24), If-None-Match (section 14.26), and If-Range (section 14.27) header fields.
          readOnly: true
        identity:
          $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.Identity'
        sku:
          $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.Sku'
        plan:
          $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.Plan'
      allOf:
        - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.TrackedResource'
      description: The resource model definition containing the full set of allowed properties for a resource. Except properties bag, there cannot be a top level property outside of this set.
    Azure.ResourceManager.CommonTypes.Severity:
      anyOf:
        - type: string
        - type: string
          enum:
            - Warning
            - Error
      description: Severity of the issue.
    Azure.ResourceManager.CommonTypes.Sku:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the SKU. Ex - P3. It is typically a letter+number code
        tier:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.SkuTier'
          description: This field is required to be implemented by the Resource Provider if the service has more than one tier, but is not required on a PUT.
        size:
          type: string
          description: The SKU size. When the name field is the combination of tier and some other value, this would be the standalone code.
        family:
          type: string
          description: If the service has different generations of hardware, for the same SKU, then that can be captured here.
        capacity:
          type: integer
          format: int32
          description: If the SKU supports scale out/in then the capacity integer should be included. If scale out/in is not possible for the resource this may be omitted.
      description: The resource model definition representing SKU
    Azure.ResourceManager.CommonTypes.SkuTier:
      type: string
      enum:
        - Free
        - Basic
        - Standard
        - Premium
      description: This field is required to be implemented by the Resource Provider if the service has more than one tier, but is not required on a PUT.
    Azure.ResourceManager.CommonTypes.SystemData:
      type: object
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.createdByType'
          description: The type of identity that created the resource.
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          allOf:
            - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.createdByType'
          description: The type of identity that last modified the resource.
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC)
      description: Metadata pertaining to creation and last modification of the resource.
    Azure.ResourceManager.CommonTypes.TrackedResource:
      type: object
      required:
        - location
      properties:
        tags:
          type: object
          unevaluatedProperties:
            type: string
          description: Resource tags.
        location:
          allOf:
            - $ref: '#/components/schemas/Azure.Core.azureLocation'
          description: The geo-location where the resource lives
      allOf:
        - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.Resource'
      description: The resource model definition for an Azure Resource Manager tracked top level resource which has 'tags' and a 'location'
      title: Tracked Resource
    Azure.ResourceManager.CommonTypes.createdByType:
      anyOf:
        - type: string
          enum:
            - User
            - Application
            - ManagedIdentity
            - Key
        - type: string
      description: The kind of entity that created the resource.
    Azure.ResourceManager.ResourceProvisioningState:
      anyOf:
        - type: string
          enum:
            - Succeeded
            - Failed
            - Canceled
        - type: string
      description: The provisioning state of a resource type.
    Employee:
      type: object
      properties:
        properties:
          allOf:
            - $ref: '#/components/schemas/EmployeeProperties'
          description: The resource-specific properties for this resource.
      allOf:
        - $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.TrackedResource'
      description: A Widget Employee resource
    EmployeeListResult:
      type: object
      required:
        - value
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/Employee'
          description: The Employee items on this page
        nextLink:
          type: string
          format: uri
          description: The link to the next page of items
      description: The response of a Employee list operation.
    EmployeeProperties:
      type: object
      properties:
        age:
          type: integer
          format: int32
          description: Age of employee
        city:
          type: string
          description: City of employee
        profile:
          type: string
          contentEncoding: base64url
          description: Profile of employee
        provisioningState:
          allOf:
            - $ref: '#/components/schemas/ProvisioningState'
          description: The status of the last operation.
          readOnly: true
      description: Employee properties
    EmployeeUpdate:
      type: object
      properties:
        tags:
          type: object
          unevaluatedProperties:
            type: string
          description: Resource tags.
        properties:
          allOf:
            - $ref: '#/components/schemas/EmployeeUpdateProperties'
          description: The resource-specific properties for this resource.
      description: The type used for update operations of the Employee.
    EmployeeUpdateProperties:
      type: object
      properties:
        age:
          type: integer
          format: int32
          description: Age of employee
        city:
          type: string
          description: City of employee
        profile:
          type: string
          contentEncoding: base64url
          description: Profile of employee
      description: The updatable properties of the Employee.
    OperationListResult:
      type: object
      required:
        - value
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/Azure.ResourceManager.CommonTypes.Operation'
          description: The Operation items on this page
        nextLink:
          type: string
          format: uri
          description: The link to the next page of items
      description: A list of REST API operations supported by an Azure Resource Provider. It contains an URL link to get the next set of results.
    ProvisioningState:
      anyOf:
        - $ref: '#/components/schemas/Azure.ResourceManager.ResourceProvisioningState'
        - type: string
          enum:
            - Provisioning
            - Updating
            - Deleting
            - Accepted
        - type: string
      description: The resource provisioning state.
    Versions:
      type: string
      enum:
        - '2021-10-01'
        - 2024-10-01-preview
      description: The available API versions.
  securitySchemes:
    azure_auth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
      description: Azure Active Directory OAuth2 Flow.
servers:
